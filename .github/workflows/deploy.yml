name: Deploy after CI

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  deploy-vercel:
    name: Trigger Vercel production deploy
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: VERCEL_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --request POST "$DEPLOY_HOOK_URL"

  deploy-render:
    name: Trigger Render production deploy
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --request POST "$DEPLOY_HOOK_URL"
